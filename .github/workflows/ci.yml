name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-public-anon-key
  E2E_AUTH_ENABLED: "false"

jobs:
  quality:
    name: Qualidade e build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Executar harness
        run: npm run validate
      - name: Gerar build de produção
        run: npm run build

  e2e-public:
    name: E2E público
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Instalar Chromium
        run: npx playwright install --with-deps chromium
      - name: Gerar build de produção
        run: npm run build
      - name: Executar jornadas públicas
        run: npm run test:e2e

  security:
    name: Vulnerabilidades críticas
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Baixar código
        uses: actions/checkout@v4
      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Auditar dependências
        run: npm audit --audit-level=critical
